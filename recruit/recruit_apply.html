<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/font.css" />
    <link rel="stylesheet" href="../assets/css/lib/aos.min.css" type="text/css" />
    <link rel="stylesheet" href="../assets/css/lib/swiper11.min.css" />
    <link rel="stylesheet" href="../assets/css/lib/lenis.min.css" />

    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/common.css" />
    <link rel="stylesheet" href="../assets/css/recruit.css" />
    <!-- JS -->
    <script src="../assets/js/lib/aos.min.js"></script>
    <script src="../assets/js/lib/lenis.min.js"></script>
    <script src="../assets/js/lib/jquery-3.6.1.min.js"></script>
    <script src="../assets/js/lib/swiper11.min.js"></script>
    <script src="../assets/js/lib/gsap.min.js"></script>
    <script src="../assets/js/lib/scrolltrigger.min.js"></script>
    <script src="../assets/js/lib/scrollToPlugin.min.js"></script>
    <script type="module" src="../assets/js/common.js?v=20260623-4"></script>
  </head>

  <body>
    <div class="wrap">
      <header id="header_recruit"></header>
      <div class="container recruit list">
        <!-- S : intro -->
        <section class="intro page_tit_wrap">
          <div class="tit_wrap" data-aos="fade-down" data-aos-duration="1000">
            <h2>Step into the Team</h2>
            <div class="tit_line"></div>
            <p>
              우리는 기술과 사람, 문제와 해답 사이를 함께
              <br class="m_br" />채워나갈 팀원을 기다립니다. <br />아래 공고에서
              당신의 역할을 확인해보세요.
            </p>
          </div>
        </section>

        <!-- S : sub-1 -->
        <section class="sub1">
          <div class="sub-inner">
            <div class="tab_wrap">
              <div class="tabs swiper-wrapper">
                <div class="swiper-slide">
                  <button type="button" class="active" data-cate="all">
                    ALL <span class="badge"></span>
                  </button>
                </div>
                <div class="swiper-slide">
                  <button type="button" data-cate="engineer">
                    Engineering <span class="badge"></span>
                  </button>
                </div>
                <div class="swiper-slide">
                  <button type="button" data-cate="developer">
                    Tech <span class="badge"></span>
                  </button>
                </div>
                <div class="swiper-slide">
                  <button type="button" data-cate="designer">
                    Design <span class="badge"></span>
                  </button>
                </div>
                <div class="swiper-slide">
                  <button type="button" data-cate="management">
                    Corporate <span class="badge"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <hr />
          <div class="sub-inner">
            <div class="apply_content">
              <div class="apply_left">
                <div class="nav_wrap">
                  <h3>
                    Filters
                    <button class="btn-close">닫기</button>
                  </h3>

                  <ul class="nav open" data-lenis-prevent-wheel>
                    <li class="nav_all">
                      <div class="job_name">
                        <a class="checkbox_container">
                          <input type="checkbox" id="job_all" />
                          <label for="job_all">전체</label>
                        </a>
                      </div>
                      <ul class="depth1"></ul>
                    </li>
                  </ul>
                </div>
              </div>
              <div class="apply_list">
                <p class="total"><b>총 0개</b> 팀에서 현재 채용중 입니다</p>
                <button class="btn_filter"></button>

                <ul class="list_wrap"></ul>
              </div>
            </div>
          </div>
        </section>
        <!-- E : sub1 -->
      </div>
      <footer id="footer"></footer>
    </div>

    <script>
      gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

      // recruit_header 숨기기
      const showNav_recruit = gsap
        .from("#header_recruit", {
          yPercent: -200,
          paused: true,
          duration: 0.2,
        })
        .progress(1);

      ScrollTrigger.create({
        start: "top top",
        end: 99999,
        onUpdate: (self) => {
          self.direction === -1
            ? showNav_recruit.play()
            : showNav_recruit.reverse();
        },
      });
    </script>
    <script src="../assets/js/apply.js"></script>
  </body>
</html>
